version: '3.8'

services:
  # PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: orion-postgres
    ports:
      - "5432:5432"
    environment:
      # Passwords sourced from .env so they don't ship in VCS.
      # Compose will abort if these are unset; set them in .env.
      - POSTGRES_USER=${POSTGRES_USER:-orion}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=${POSTGRES_DB:-orion_db}
      - POSTGRES_HOST_AUTH_METHOD=md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - orion-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion -d orion_db"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: orion-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    volumes:
      - redis_data:/data
    networks:
      - orion-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Elasticsearch for RAG
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: orion-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - orion-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: orion-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-orion_admin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY in .env}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - orion-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ORION API Server
  orion-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: orion-api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - ELASTICSEARCH_HOST=elasticsearch
      - MINIO_ENDPOINT=minio:9000
    volumes:
      - ./config:/app/config:ro
      - ./templates:/app/templates:ro
      - orion_logs:/app/logs
    depends_on:
      - postgres
      - redis
      - elasticsearch
      - minio
    networks:
      - orion-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ORION Frontend (Next.js)
  orion-frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: orion-frontend
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://orion-api:8000
    depends_on:
      - orion-api
    networks:
      - orion-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Celery Worker for Background Tasks
  orion-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: orion-worker
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:?}@redis:6379/0
    volumes:
      - ./config:/app/config:ro
      - simulation_data:/app/simulations
    depends_on:
      - redis
      - postgres
    networks:
      - orion-network
    command: celery -A src.worker.celery_app worker --loglevel=info

  # Flower for Celery Monitoring
  flower:
    image: mher/flower:2.0
    container_name: orion-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?}@redis:6379/0
      - FLOWER_PORT=5555
    depends_on:
      - redis
    networks:
      - orion-network

  # Prometheus for Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: orion-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - orion-network

  # Grafana for Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: orion-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - orion-network

  # Jupyter Lab for Interactive Development
  jupyter:
    build:
      context: .
      dockerfile: docker/Dockerfile.jupyter
    container_name: orion-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-orion_local_dev_token}
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./src:/home/jovyan/orion:ro
    networks:
      - orion-network

networks:
  orion-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:
  orion_logs:
  simulation_data:
  prometheus_data:
  grafana_data: