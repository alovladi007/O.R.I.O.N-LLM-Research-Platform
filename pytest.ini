[pytest]
# ORION pytest configuration (Phase 0 / Session 0.5).
#
# The `slow`, `requires_db`, `requires_redis`, and `requires_engines` markers
# gate tests that depend on external infrastructure. Default CI runs
# `pytest -m "not slow and not requires_engines"` to keep the unit-test
# signal fast while still exercising DB-integration tests on Postgres.

python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Async support — plain pytest-asyncio in auto mode. anyio fixtures may also
# be used; tests can opt in by importing the conftest `anyio_backend` fixture.
asyncio_mode = auto

# Logging (quiet by default; re-enable with `-o log_cli=true` when debugging)
log_cli = false
log_cli_level = INFO

# Markers — keep in sync with conftest skip logic.
markers =
    unit: fast, no external dependencies
    integration: requires infrastructure (DB / Redis / MinIO) to be reachable
    slow: long-running (>5s); excluded from default CI run
    e2e: hits both backend and frontend
    requires_db: needs a reachable Postgres (uses DATABASE_URL)
    requires_redis: needs a reachable Redis (uses REDIS_URL)
    requires_engines: needs native simulation engines (QE / LAMMPS / MPI)
    requires_gpu: needs a CUDA GPU
    requires_slurm: needs a reachable SLURM cluster

# Default command line — coverage is collected but without a fail-under
# threshold yet. Session 0.5 doesn't have the coverage to meet one; Phase
# 11 raises the bar once the test suite exists.
addopts =
    --strict-markers
    --tb=short
    -ra
    --cov=src
    --cov=backend
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-report=xml

# Test environment — pytest-env picks these up.
# Values here are safe for the dev invariants; they're NOT the production
# invariants (env=testing short-circuits several of those).
env =
    ORION_ENV=testing
    JWT_SECRET_KEY=testing-only-secret-key-32chars-minimum-abc123
    DATABASE_URL=postgresql+asyncpg://orion:test_password_not_real@localhost:5432/orion_test
    REDIS_URL=redis://:test_password_not_real@localhost:6379/1
    CORS_ORIGINS=http://testserver,http://localhost:3000

# Filter out the known noisy pre-refactor warnings. Real deprecations surface
# because we don't blanket-ignore DeprecationWarning.
filterwarnings =
    ignore::PendingDeprecationWarning
    # pydantic v2 sometimes emits protected-namespace warnings we've reviewed
    ignore::UserWarning:pydantic._internal._fields

# Session-wide hard timeout. Individual slow tests can override with
# @pytest.mark.timeout(N).
timeout = 60
timeout_method = thread
